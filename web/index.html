<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片解析生成Excel报表</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 32px; line-height: 1.5; }
    .container { max-width: 960px; margin: 0 auto; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    button { padding: 8px 14px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
    .muted { color: #666; }
    .error { color: #b00020; }
    .highlight { background: #fff3a3; padding: 0 2px; border-radius: 2px; }
    th.sortable { cursor: pointer; user-select: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .badge-instant { background: #e8f7ee; color: #167a3e; }
    .badge-non-instant { background: #eaf2ff; color: #1f5fbf; }
    .badge-unknown { background: #f3f3f3; color: #666; }
    .toolbar-inline { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .note-box { margin-top: 10px; padding: 10px 12px; border: 1px dashed #bbb; border-radius: 6px; background: #fafafa; font-size: 13px; }
    .danger { color: #b00020; font-weight: 700; }
    .alert-modal { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .alert-modal-card { width: min(800px, 92vw); max-height: 80vh; overflow: auto; background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 12px 30px rgba(0,0,0,.28); border: 3px solid #ff9800; }
    .alert-modal-card h3 { margin: 0 0 8px; color: #b00020; }
    .alert-modal-card ul { margin: 10px 0; padding-left: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>采购 / 营业 / 日报（框架）</h2>

    <div class="card">
      <strong>采购入库</strong>
      <div style="margin-top: 10px;">
        <label class="muted">日期：</label>
        <input id="purchaseDate" type="date" />
      </div>
      <div style="margin-top: 10px;">
        <input id="purchaseFiles" type="file" accept="image/*" multiple />
        <button id="purchaseParseBtn">开始识别</button>
        <button id="purchaseSaveBtn" style="margin-left: 8px; display: none;">保存到数据库</button>
        <a id="purchaseDownload" href="/api/purchase/download-latest" style="margin-left: 8px; display: none;">下载Excel</a>
      </div>
      <div class="toolbar-inline">
        <input id="purchaseManualName" type="text" placeholder="手动录入用料名称" style="min-width: 240px;" />
        <input id="purchaseManualQty" type="number" min="0" step="0.01" value="1" style="width: 100px;" />
        <input id="purchaseManualUnit" type="text" placeholder="单位(如克/毫升/个)" style="width: 140px;" />
        <button id="purchaseManualAddBtn">添加用料</button>
      </div>
      <p id="purchaseStatus" class="muted"></p>
      <p id="purchaseErrors" class="error"></p>
      <p id="purchaseSaveResult" class="muted"></p>
      <div class="muted" style="margin-top: 8px;">
        <label style="user-select: none;">
          <input id="purchaseSelectAll" type="checkbox" />
          全选
        </label>
      </div>
      <div style="overflow-x: auto;">
        <table id="purchaseTable"></table>
      </div>
    </div>

    <div class="card">
      <strong>营业入库</strong>
      <div style="margin-top: 10px;">
        <label class="muted">日期：</label>
        <input id="salesDate" type="date" />
      </div>
      <div style="margin-top: 10px;">
        <input id="salesFiles" type="file" accept="image/*" multiple />
        <button id="salesParseBtn">开始识别</button>
        <button id="salesSaveBtn" style="margin-left: 8px; display: none;">确认录入库存</button>
        <a id="salesDownload" href="/api/sales/download-latest" style="margin-left: 8px; display: none;">下载Excel</a>
      </div>
      <div class="toolbar-inline">
        <label><input id="salesAutoSaveToggle" type="checkbox" /> 识别后自动入库（默认关闭）</label>
      </div>
      <div class="toolbar-inline">
        <input id="salesManualDishName" list="salesDishSuggestions" type="text" placeholder="手动补录菜名（支持模糊匹配）" style="min-width: 260px;" />
        <datalist id="salesDishSuggestions"></datalist>
        <input id="salesManualQty" type="number" min="0" step="1" value="1" style="width: 90px;" />
        <input id="salesManualUnitPrice" type="number" min="0" step="0.01" placeholder="单价(可选)" style="width: 120px;" />
        <button id="salesManualAddBtn">添加菜品</button>
      </div>
      <p id="salesStatus" class="muted"></p>
      <p id="salesErrors" class="error"></p>
      <p id="salesSaveResult" class="muted"></p>
      <div class="muted" style="margin-top: 8px;">
        <label style="user-select: none;">
          <input id="salesSelectAll" type="checkbox" />
          全选
        </label>
      </div>
      <div style="overflow-x: auto;">
        <table id="salesTable"></table>
      </div>
    </div>

    <div class="card">
      <strong>日报（骨架）</strong>
      <div style="margin-top: 10px;">
        <label class="muted">日期：</label>
        <input id="reportDate" type="date" />
        <button id="reportLoadBtn" style="margin-left: 8px;">加载</button>
        <a id="reportDownload" href="#" style="margin-left: 8px; display: none;">下载日报Excel</a>
      </div>
      <p id="reportStatus" class="muted"></p>
      <div id="reportSummary"></div>
      <div id="reportMethodNote" class="note-box" style="display:none;"></div>
      <div id="reportTables"></div>
    </div>

    <div class="card">
      <strong>库存查看</strong>
      <div style="margin-top: 10px;">
        <label class="muted">商品名搜索：</label>
        <input id="inventoryKeyword" type="text" placeholder="输入关键词后回车或点查询" style="min-width: 220px;" />
        <button id="inventoryLoadBtn">查看库存</button>
        <button id="inventoryReclassifyBtn" style="margin-left: 8px;">重分类历史数据</button>
        <button id="inventoryExportBtn" style="margin-left: 8px;">导出当前CSV</button>
        <button id="inventoryNotifyBtn" style="margin-left: 8px;">发送飞书预警</button>
      </div>
      <div class="toolbar-inline">
        <button id="typeFilterAllBtn">全部</button>
        <button id="typeFilterInstantBtn">仅即时消耗</button>
        <button id="typeFilterNonInstantBtn">仅非即时消耗</button>
        <button id="typeFilterUnknownBtn">仅待分类</button>
      </div>
      <p id="inventoryStatus" class="muted"></p>
      <div style="overflow-x: auto;">
        <table id="inventoryTable"></table>
      </div>
    </div>
  </div>
  <div id="inventoryAlertModal" class="alert-modal">
    <div class="alert-modal-card">
      <h3>库存预警</h3>
      <p class="danger">检测到部分物料库存低于预设阈值，请及时补货。</p>
      <ul id="inventoryAlertList"></ul>
      <div style="text-align: right;">
        <button id="inventoryAlertCloseBtn">我知道了</button>
      </div>
    </div>
  </div>

  <script>
    function todayISO() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    const COLUMN_LABELS = {
      product_name: "商品名称",
      unit_price: "商品单价",
      quantity: "购买份数",
      unit_amount: "单份数量",
      quantity_unit: "量词",
      total_quantity: "总数量",
      amount: "商品金额",
      order_created_at: "订单生成时间",
      remarks: "备注",
      consumption_type: "消耗类型",
    };
    const COLUMN_ORDER = [
      "product_name",
      "unit_price",
      "quantity",
      "unit_amount",
      "quantity_unit",
      "total_quantity",
      "amount",
      "consumption_type",
      "order_created_at",
      "remarks",
    ];

    function consumptionTypeLabel(value) {
      if (value === "instant") return "即时消耗";
      if (value === "non_instant") return "非即时消耗";
      if (value === "unknown") return "待分类";
      return value ?? "";
    }

    function consumptionTypeBadge(typeValue, typeLabel) {
      const label = typeLabel || consumptionTypeLabel(typeValue) || "待分类";
      if (typeValue === "instant") return `<span class="badge badge-instant">${escapeHtml(label)}</span>`;
      if (typeValue === "non_instant") return `<span class="badge badge-non-instant">${escapeHtml(label)}</span>`;
      return `<span class="badge badge-unknown">${escapeHtml(label)}</span>`;
    }

    function createSelectableTable({ tableEl, selectAllEl, formatCell, selectAllByDefault = false }) {
      const state = {
        rows: [],
        columns: null,
        selected: new Set(),
      };

      function refreshSelectAll() {
        if (!state.rows.length) {
          selectAllEl.checked = false;
          selectAllEl.indeterminate = false;
          return;
        }
        const selectedCount = state.selected.size;
        if (selectedCount === 0) {
          selectAllEl.checked = false;
          selectAllEl.indeterminate = false;
        } else if (selectedCount === state.rows.length) {
          selectAllEl.checked = true;
          selectAllEl.indeterminate = false;
        } else {
          selectAllEl.checked = false;
          selectAllEl.indeterminate = true;
        }
      }

      function render() {
        tableEl.innerHTML = "";
        if (!state.rows.length) {
          tableEl.innerHTML = "<tr><td>暂无数据</td></tr>";
          refreshSelectAll();
          return;
        }
        const headers =
          state.columns && Array.isArray(state.columns) && state.columns.length
            ? state.columns.map((c) => c.key)
            : COLUMN_ORDER.filter((key) => state.rows.some((row) => Object.hasOwn(row, key)));
        const headerLabels = {};
        if (state.columns && Array.isArray(state.columns)) {
          state.columns.forEach((c) => (headerLabels[c.key] = c.label));
        }
        const thead =
          "<tr>" +
          `<th style="width: 60px;">选择</th>` +
          headers.map((h) => `<th>${headerLabels[h] || COLUMN_LABELS[h] || h}</th>`).join("") +
          "</tr>";
        const tbody = state.rows
          .map((row, idx) => {
            const checked = state.selected.has(idx) ? "checked" : "";
            const cells = headers
              .map((h) => {
                const v = formatCell ? formatCell({ key: h, value: row[h], row }) : row[h];
                return `<td>${v ?? ""}</td>`;
              })
              .join("");
            return `<tr>
              <td style="text-align:center;">
                <input type="checkbox" data-row-idx="${idx}" ${checked} />
              </td>
              ${cells}
            </tr>`;
          })
          .join("");
        tableEl.innerHTML = thead + tbody;

        tableEl.querySelectorAll("input[type=checkbox][data-row-idx]").forEach((el) => {
          el.addEventListener("change", (e) => {
            const i = Number(e.target.getAttribute("data-row-idx"));
            if (e.target.checked) state.selected.add(i);
            else state.selected.delete(i);
            refreshSelectAll();
          });
        });
        refreshSelectAll();
      }

      selectAllEl.addEventListener("change", () => {
        state.selected = new Set();
        if (selectAllEl.checked) {
          state.rows.forEach((_, idx) => state.selected.add(idx));
        }
        render();
      });

      return {
        setData({ rows, columns }) {
          state.rows = rows || [];
          state.columns = columns || null;
          state.selected = new Set();
          if (selectAllByDefault) {
            state.rows.forEach((_, idx) => state.selected.add(idx));
          }
          render();
        },
        appendRows(rows) {
          if (!Array.isArray(rows) || !rows.length) return;
          const start = state.rows.length;
          state.rows = state.rows.concat(rows);
          if (selectAllByDefault) {
            rows.forEach((_, idx) => state.selected.add(start + idx));
          }
          render();
        },
        getSelectedRows() {
          return Array.from(state.selected)
            .map((i) => state.rows[i])
            .filter(Boolean);
        },
        clear() {
          state.rows = [];
          state.columns = null;
          state.selected = new Set();
          render();
        },
      };
    }

    function bindFlow({
      dateEl,
      filesEl,
      parseBtn,
      saveBtn,
      downloadEl,
      statusEl,
      errorsEl,
      saveResultEl,
      table,
      parseUrl,
      saveUrl,
    }) {
      let lastBizDate = "";
      let lastImagePaths = [];

      function reset() {
        errorsEl.textContent = "";
        saveResultEl.textContent = "";
        statusEl.textContent = "";
        saveBtn.style.display = "none";
        if (downloadEl) downloadEl.style.display = "none";
        lastBizDate = "";
        lastImagePaths = [];
        table.clear();
      }

      parseBtn.addEventListener("click", async () => {
        reset();
        const files = filesEl.files;
        if (!files || !files.length) {
          statusEl.textContent = "请先选择图片。";
          return;
        }
        const formData = new FormData();
        Array.from(files).forEach((file) => formData.append("files", file));
        formData.append("biz_date", dateEl.value || "");

        statusEl.textContent = "识别中，请稍候...";
        try {
          const resp = await fetch(parseUrl, { method: "POST", body: formData });
          const data = await resp.json();
          if (!resp.ok) {
            const detail = data.detail ? JSON.stringify(data.detail) : "识别失败";
            throw new Error(detail);
          }
          lastBizDate = data.biz_date || (dateEl.value || "");
          lastImagePaths = data.source_image_paths || [];
          const rows = data.preview || [];
          const columns = (data.preview_columns || null)
            ? data.preview_columns.filter((c) => c.key !== "quantity_unit")
            : null;
          table.setData({ rows, columns });
          statusEl.textContent = `识别完成：${rows.length} 条。`;
          if (data.auto_saved) {
            saveBtn.style.display = "none";
            const s = data.save_summary || {};
            const c = data.ticket_consumption || [];
            saveResultEl.textContent = `自动入库完成：新增 ${s.inserted || 0}，跳过 ${s.skipped || 0}，累加 ${s.accumulated || 0}；本单扣减明细 ${c.length} 条。`;
          }
          if (data.errors && data.errors.length) {
            errorsEl.textContent = "失败明细：" + JSON.stringify(data.errors);
          }
          if (!data.auto_saved) saveBtn.style.display = rows.length ? "inline" : "none";
          if (downloadEl) downloadEl.style.display = rows.length ? "inline" : "none";
        } catch (err) {
          statusEl.textContent = "处理失败。";
          errorsEl.textContent = String(err);
        }
      });

      saveBtn.addEventListener("click", async () => {
        errorsEl.textContent = "";
        saveResultEl.textContent = "";
        const items = table.getSelectedRows();
        if (!items.length) {
          saveResultEl.textContent = "请先勾选要保存的条目。";
          return;
        }
        saveResultEl.textContent = "保存中...";
        try {
          const resp = await fetch(saveUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              biz_date: lastBizDate || (dateEl.value || ""),
              source_image_paths: lastImagePaths,
              items,
            }),
          });
          const data = await resp.json();
          if (!resp.ok) {
            const detail = data.detail ? JSON.stringify(data.detail) : "保存失败";
            throw new Error(detail);
          }
          saveResultEl.textContent = `已处理：新增 ${data.inserted}，跳过 ${data.skipped}，累加 ${data.accumulated}。`;
        } catch (err) {
          saveResultEl.textContent = "保存失败。";
          errorsEl.textContent = String(err);
        }
      });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function normalizeNumberDisplay(value) {
      const raw = String(value ?? "");
      if (!raw) return "";
      if (!/^-?\d+(\.\d+)?$/.test(raw)) return raw;
      if (!raw.includes(".")) return raw;
      return raw.replace(/(\.\d*?[1-9])0+$/, "$1").replace(/\.0+$/, "");
    }

    function renderHighlightedText(text, keyword) {
      const source = String(text ?? "");
      if (!keyword) return escapeHtml(source);
      const lower = source.toLowerCase();
      const key = keyword.toLowerCase();
      let idx = 0;
      let out = "";
      while (idx < source.length) {
        const found = lower.indexOf(key, idx);
        if (found === -1) {
          out += escapeHtml(source.slice(idx));
          break;
        }
        out += escapeHtml(source.slice(idx, found));
        out += `<span class="highlight">${escapeHtml(source.slice(found, found + key.length))}</span>`;
        idx = found + key.length;
      }
      return out;
    }

    function renderInventoryTable(tableEl, rows, keyword, sortState) {
      tableEl.innerHTML = "";
      if (!rows.length) {
        tableEl.innerHTML = "<tr><td>暂无库存数据</td></tr>";
        return;
      }
      const headers = [
        ["product_name", "商品名称"],
        ["consumption_type_label", "消耗类型"],
        ["_actions", "操作"],
        ["_alert", "库存预警设置"],
        ["quantity", "购买份数"],
        ["unit_price", "单价"],
        ["unit_amount", "单份数量"],
        ["total_quantity", "总数量"],
        ["amount", "金额"],
        ["last_saved_date", "最后保存日期"],
        ["updated_at", "更新时间"],
      ];
      const thead =
        "<tr>" +
        headers
          .map(([key, label]) => {
            const arrow =
              sortState && sortState.key === key ? (sortState.direction === "asc" ? " ▲" : " ▼") : "";
            return `<th class="sortable" data-sort-key="${key}">${label}${arrow}</th>`;
          })
          .join("") +
        "</tr>";
      const tbody = rows
        .map((row) => {
          return (
            "<tr>" +
            headers
              .map(([key]) => {
                if (key === "product_name") return `<td>${renderHighlightedText(row[key], keyword)}</td>`;
                if (key === "consumption_type_label") return `<td>${consumptionTypeBadge(row.consumption_type, row[key])}</td>`;
                if (key === "_actions") {
                  const id = row.id;
                  const cur = row.consumption_type || "unknown";
                  const options = [
                    ["unknown", "未分类"],
                    ["instant", "即时消耗"],
                    ["non_instant", "非即时消耗"],
                  ]
                    .map(([v, label]) => `<option value="${v}"${v === cur ? " selected" : ""}>${label}</option>`)
                    .join("");
                  return (
                    `<td>` +
                    `<select class="inv-type-select" data-id="${id}" style="max-width: 110px;">${options}</select>` +
                    `<button class="inv-type-save" data-id="${id}" style="margin-left: 6px;">保存</button>` +
                    `</td>`
                  );
                }
                if (key === "_alert") {
                  const id = row.id;
                  const enabled = row.low_stock_alert_enabled ? "checked" : "";
                  const threshold = row.low_stock_threshold == null ? "" : row.low_stock_threshold;
                  return (
                    `<td>` +
                    `<label style="white-space:nowrap;"><input type="checkbox" class="inv-alert-enabled" data-id="${id}" ${enabled} />启用</label>` +
                    `<input class="inv-alert-threshold" data-id="${id}" type="number" min="0" step="0.01" value="${escapeHtml(threshold)}" placeholder="阈值" style="width:90px;margin-left:6px;" />` +
                    `<button class="inv-alert-save" data-id="${id}" style="margin-left:6px;">保存</button>` +
                    `</td>`
                  );
                }
                if (key === "remarks") return "<td></td>";
                if (key === "unit_amount" || key === "total_quantity") {
                  const v = normalizeNumberDisplay(row[key]);
                  const unit = row.quantity_unit || "";
                  return `<td>${escapeHtml(v ? `${v}${unit}` : "")}</td>`;
                }
                if (key === "unit_price" || key === "amount") {
                  const v = normalizeNumberDisplay(row[key]);
                  return `<td>${escapeHtml(v ? `${v}元` : "")}</td>`;
                }
                if (key === "quantity") {
                  return `<td>${escapeHtml(normalizeNumberDisplay(row[key]))}</td>`;
                }
                return `<td>${escapeHtml(row[key] ?? "")}</td>`;
              })
              .join("") +
            "</tr>"
          );
        })
        .join("");
      tableEl.innerHTML = thead + tbody;
    }

    async function updateInventoryConsumptionType(itemId, consumptionType) {
      const resp = await fetch(`/api/purchase/items/${encodeURIComponent(itemId)}/consumption-type`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ consumption_type: consumptionType }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        const detail = data.detail ? JSON.stringify(data.detail) : "保存失败";
        throw new Error(detail);
      }
      return data.item;
    }

    async function updateInventoryAlertConfig(itemId, enabled, threshold) {
      const resp = await fetch(`/api/purchase/items/${encodeURIComponent(itemId)}/alert-config`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ enabled, threshold }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        const detail = data.detail ? JSON.stringify(data.detail) : "保存失败";
        throw new Error(detail);
      }
      return data.item;
    }

    async function fetchLowStockAlerts(triggerNotify = false) {
      const resp = await fetch(`/api/inventory/alerts?trigger_notify=${triggerNotify ? "true" : "false"}`);
      const data = await resp.json();
      if (!resp.ok) {
        const detail = data.detail ? JSON.stringify(data.detail) : "加载预警失败";
        throw new Error(detail);
      }
      return data;
    }

    function showInventoryAlertModal(items) {
      const modal = document.getElementById("inventoryAlertModal");
      const listEl = document.getElementById("inventoryAlertList");
      if (!modal || !listEl) return;
      listEl.innerHTML = (items || [])
        .slice(0, 30)
        .map((item) => {
          const unit = item.quantity_unit || "";
          return `<li><strong>${escapeHtml(item.item_name || "")}</strong>：库存 ${escapeHtml(normalizeNumberDisplay(item.current_stock))}${escapeHtml(unit)}，阈值 ${escapeHtml(normalizeNumberDisplay(item.threshold))}${escapeHtml(unit)}</li>`;
        })
        .join("");
      modal.style.display = "flex";
    }

    function bindInventoryActions() {
      inventoryTableEl.querySelectorAll("button.inv-type-save").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-id");
          const select = inventoryTableEl.querySelector(`select.inv-type-select[data-id="${id}"]`);
          const next = select ? select.value : "unknown";
          btn.disabled = true;
          const oldText = btn.textContent;
          btn.textContent = "保存中...";

      ];
      const escapeCell = (value) => {
        const text = value == null ? "" : String(value);
        if (/[",\n]/.test(text)) {
          return `"${text.replace(/"/g, '""')}"`;
        }
        return text;
      };
      const lines = [
        headers.map(([, label]) => escapeCell(label)).join(","),
        ...rows.map((row) => headers.map(([key]) => escapeCell(row[key])).join(",")),
      ];
      return lines.join("\n");

      const key = String(fieldName || "");

    function formatReportCell(fieldName, value) {
      const raw = value == null ? "" : String(value).trim();
      if (!raw) return "";
      // 数量类字段：0 或 0.00(含单位) 显示为“无”，且不显示单位
      if (isQuantityLikeField(fieldName) && /^0+(?:\.0+)?(?:[^\d].*)?$/.test(raw)) {
        return "无";
      }
      // 常见小数去尾零（如 12.000 -> 12, 3.1400 -> 3.14）
      const pureNum = raw.match(/^-?\d+(?:\.\d+)?$/);
      if (pureNum) {
        return raw.replace(/(\.\d*?[1-9])0+$/, "$1").replace(/\.0+$/, "");
      }
      return raw;
    }

    function toComparable(v) {
      if (v == null || v === "") return null;
      const n = Number(v);
      if (!Number.isNaN(n)) return n;
      const t = Date.parse(v);
      if (!Number.isNaN(t)) return t;
      return String(v).toLowerCase();
    }

    function applyInventoryView() {
      const keyword = (inventoryKeywordEl.value || "").trim();
      const lowerKeyword = keyword.toLowerCase();
      const keywordFiltered = lowerKeyword
        ? inventorySourceRows.filter((row) => String(row.product_name || "").toLowerCase().includes(lowerKeyword))
        : [...inventorySourceRows];
      const filtered =
        inventoryTypeFilter === "all"
          ? keywordFiltered
          : keywordFiltered.filter((row) => (row.consumption_type || "unknown") === inventoryTypeFilter);
      const { key, direction } = inventorySortState;
      filtered.sort((a, b) => {
        const av = toComparable(a[key]);
        const bv = toComparable(b[key]);
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        if (av > bv) return direction === "asc" ? 1 : -1;
        if (av < bv) return direction === "asc" ? -1 : 1;
        return 0;
      });
      currentInventoryRows = filtered;
      renderInventoryTable(inventoryTableEl, currentInventoryRows, keyword, inventorySortState);
      inventoryStatusEl.textContent = `加载完成，共 ${currentInventoryRows.length} 条（筛选：${consumptionTypeLabel(inventoryTypeFilter)}）。`;
      bindInventoryActions();
      inventoryTableEl.querySelectorAll("th.sortable").forEach((th) => {
        th.addEventListener("click", () => {
          const nextKey = th.getAttribute("data-sort-key");
          if (!nextKey) return;
          if (inventorySortState.key === nextKey) {
            inventorySortState.direction = inventorySortState.direction === "asc" ? "desc" : "asc";
          } else {
            inventorySortState = { key: nextKey, direction: "asc" };
          }
          applyInventoryView();
        });
      });
    }

      try {
        const resp = await fetch("/api/purchase/reclassify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ include_classified: false, limit: 5000 }),
        });
        const data = await resp.json();
        if (!resp.ok) {
          const detail = data.detail ? JSON.stringify(data.detail) : "重分类失败";
          throw new Error(detail);
        }
        inventoryStatusEl.textContent = data.message || "重分类完成。";
        await loadInventory();
      } catch (err) {
        inventoryStatusEl.textContent = `重分类失败：${String(err)}`;
      }
    });

    document.getElementById("inventoryExportBtn").addEventListener("click", () => {
      if (!currentInventoryRows.length) {
        inventoryStatusEl.textContent = "当前没有可导出的库存数据。";
        return;
      }
      const csv = toCsv(currentInventoryRows);
      const ts = new Date().toISOString().replace(/[:.]/g, "-");
      downloadTextFile(`inventory_${ts}.csv`, csv, "text/csv;charset=utf-8");
      inventoryStatusEl.textContent = `已导出 ${currentInventoryRows.length} 条库存数据。`;
    });

    document.getElementById("inventoryAlertCloseBtn").addEventListener("click", () => {
      const modal = document.getElementById("inventoryAlertModal");
      if (modal) modal.style.display = "none";
    });

    window.addEventListener("load", async () => {
      try {
        const data = await fetchLowStockAlerts(false);
        if (data.popup_enabled && data.count > 0) {
          showInventoryAlertModal(data.items || []);
        }
      } catch (err) {
        console.error("load inventory alert failed", err);
      }
    });
  </script>
</body>
</html>
